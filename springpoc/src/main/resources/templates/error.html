<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ChurnPredictor - Something went wrong</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5" style="max-width: 540px;">
    <div class="card border-danger">
        <div class="card-body">
            <h4 class="card-title">Something went wrong</h4>
            <p class="text-muted mb-1">
                <span th:text="${status} ?: ''">500</span>
                <span th:text="${error} ?: 'Unexpected error'">error</span>
            </p>
            <p class="mb-3">The problem has been logged. Try again, or head back to the start.</p>
            <a th:href="@{/}" class="btn btn-primary">Back to ChurnPredictor</a>
        </div>
    </div>
</div>

</body>
</html>

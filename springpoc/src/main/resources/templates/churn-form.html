<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ChurnGuard - Check Customer Risk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5" style="max-width: 540px;">

    <h2>Churn Risk Check</h2>
    <hr>

    <form th:action="@{/churn/assess}" th:object="${customerFeatures}" method="POST">

        <div class="mb-3">
            <label for="tenure" class="form-label">Tenure (months)</label>
            <input type="number" id="tenure" th:field="*{tenure}" class="form-control">
            <div class="text-danger"
                 th:if="${#fields.hasErrors('tenure')}" th:errors="*{tenure}"></div>
        </div>

        <div class="mb-3">
            <label for="monthlyCharges" class="form-label">Monthly Charges (Rs)</label>
            <input type="number" step="0.01" id="monthlyCharges"
                   th:field="*{monthlyCharges}" class="form-control">
            <div class="text-danger"
                 th:if="${#fields.hasErrors('monthlyCharges')}" th:errors="*{monthlyCharges}"></div>
        </div>

        <div class="mb-3">
            <label for="totalCharges" class="form-label">Total Charges (Rs)</label>
            <input type="number" step="0.01" id="totalCharges"
                   th:field="*{totalCharges}" class="form-control">
            <div class="text-danger"
                 th:if="${#fields.hasErrors('totalCharges')}" th:errors="*{totalCharges}"></div>
        </div>

        <div class="mb-3">
            <label for="contract" class="form-label">Contract</label>
            <select id="contract" th:field="*{contract}" class="form-select">
                <option value="Month-to-month">Month-to-month</option>
                <option value="One year">One year</option>
                <option value="Two year">Two year</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Check Risk</button>

    </form>

</div>

</body>
</html>

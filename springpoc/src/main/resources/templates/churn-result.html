<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ChurnPredictor - Risk Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5" style="max-width: 540px;">

    <h2>Risk Assessment</h2>
    <hr>

    <div class="card">
        <div class="card-body">

            <p class="mb-2">Risk band:
                <span class="badge fs-6"
                      th:classappend="${assessment.riskBand == 'HIGH'} ? 'bg-danger'
                                      : (${assessment.riskBand == 'MEDIUM'} ? 'bg-warning text-dark'
                                      : (${assessment.riskBand == 'LOW'} ? 'bg-success' : 'bg-secondary'))"
                      th:text="${assessment.riskBand}">RISK</span>
            </p>

            <p class="mb-2" th:if="${assessment.churnPercentage != null}">
                Churn probability:
                <strong th:text="${assessment.churnPercentage}">0%</strong>
            </p>

            <p class="mb-0" th:text="${assessment.recommendation}">Recommendation</p>

        </div>
    </div>

    <a th:href="@{/churn/form}" class="btn btn-primary mt-3">Check another customer</a>

</div>

</body>
</html>
